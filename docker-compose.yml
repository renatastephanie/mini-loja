version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: mini-loja-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mini_loja}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: mini-loja-backend
    restart: unless-stopped
    environment:
      DB_NAME: ${DB_NAME:-mini_loja}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./back-end:/app
      - /app/node_modules

  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: mini-loja-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./front-end:/app
      - /app/node_modules

volumes:
  postgres_data: